# Harness-ready config for design review evals.

name: design-review
description: Evaluate design-review skill against human-validated design review baselines

execution:
  mode: case
  skill: design-review
  timeout: 600
  arguments: >
    Review the document at {document_path}.
    Write the full structured review to artifacts/review-output.md.

runner:
  type: claude-code

models:
  skill: claude-opus-4-6
  judge: claude-sonnet-4-6

mlflow:
  experiment: osac-review-eval

permissions:
  deny:
    - "mcp__atlassian__*"
    - "mcp__github__*"

hooks:
  before_all:
    - description: enhancement-proposals available in case workspace
      command: test -d enhancement-proposals
    - description: design context for review skills
      command: test -d .design
    - description: design-review skill available via workspace symlinks
      command: test -d .claude/skills/design-review || test -d skills/design-review

dataset:
  path: cases/design
  schema: |
    Each case directory contains:
    - input.yaml: document_path, skill, case_id (see docs/case-schema.md)
    - reference-review.md: Human-validated golden review output
    - annotations.yaml: Expected verdict, scores, critical findings

outputs:
  - path: artifacts
    schema: |
      Directory containing review-output.md: structured review markdown
      with rubric table, verdict PASS/FAIL, and findings sections matching
      design-review skill output format. Collected as a directory (not the
      file directly) so the harness's load_case_record() can populate
      outputs["files"] and the artifacts_content convenience key.

traces:
  stdout: true
  stderr: true
  metrics: true

judges:
  - name: rubric_scoring
    module: evals.review.lib.judges
    function: rubric_scoring

  - name: critical_findings_recall
    if: "annotations.get('critical_findings')"
    module: evals.review.lib.judges
    function: critical_findings_recall

  - name: qualitative_finding_quality
    if: "not annotations.get('skip_quality')"
    prompt_file: evals/review/judges/finding-quality.md

thresholds:
  rubric_scoring:
    min_pass_rate: 1.0
  critical_findings_recall:
    min_pass_rate: 1.0
  qualitative_finding_quality:
    min_mean: 3.5
