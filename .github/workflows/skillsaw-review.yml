name: Skillsaw Review

# SECURITY: workflow_run uses the default branch context — never checks out PR
# code. Downloads the lint report artifact from the Skillsaw workflow and posts
# inline PR comments only. See https://skillsaw.org/ci/
on:
  workflow_run:
    workflows: ["Skillsaw"]
    types: [completed]

permissions:
  actions: read
  pull-requests: write

jobs:
  review:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: stbenjam/skillsaw/review@641606f379ebea086b31dec023366c7ff89301a2 # v0
