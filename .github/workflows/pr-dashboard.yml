name: PR Dashboard

on:
  schedule:
    - cron: "*/30 6-19 * * 0-5"
  push:
    branches: [main]
    paths:
      - 'presentations/**'
      - 'index.html'
      - '.github/workflows/pr-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Generate dashboard data
        working-directory: tools/pr-notify
        env:
          GH_TOKEN: ${{ secrets.OSAC_BOT_PAT }}
        run: |
          python generate.py \
            --config config.example.toml \
            --output ../../docs/pr-dashboard/data.json

      - name: Assemble site
        run: |
          mkdir -p _site/presentations
          cp index.html _site/
          cp -r docs/pr-dashboard _site/pr-dashboard
          cp presentations/*.html _site/presentations/
          cp -r presentations/assets _site/presentations/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
