version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Consolidate minor/patch bumps into one low-risk PR per week instead of
    # one per action. Deliberately excludes major bumps from the group (via
    # update-types, not a second patterns-based group — GitHub's own docs
    # flag that combining patterns with two separate major/minor groups can
    # fail to group correctly): a major bump can carry real breaking changes
    # (e.g. actions/checkout v7 added new restrictions on fork PR checkouts
    # for pull_request_target/workflow_run triggers), so it should land as
    # its own PR for individual review rather than riding along with routine
    # updates in the same grouped diff.
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "infrastructure"
    commit-message:
      prefix: "NO-ISSUE"
